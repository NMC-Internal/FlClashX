name: flclashx
description: Fork multi-platform proxy client FlClash based on ClashMeta, simple and easy to use, open-source and ad-free.
publish_to: "none"
version: 0.4.0+2026012301

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5
  # Keychain/Keystore-backed storage for the auth + refresh tokens (ADR 0021).
  flutter_secure_storage: ^9.2.4
  window_manager: ^0.5.1
  dynamic_color: ^1.8.1
  proxy:
    path: plugins/proxy
  window_ext:
    path: plugins/window_ext
  launch_at_startup: ^0.5.1
  json_annotation: ^4.9.0
  file_picker: ^10.3.8
  mobile_scanner: ^7.1.4
  app_links: ^6.4.1
  win32_registry: ^2.1.0
  tray_manager: ^0.5.2
  qr_flutter: ^4.1.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  http: ^1.6.0
  network_info_plus: ^7.0.0
  collection: ^1.19.1
  animations: ^2.1.1
  package_info_plus: ^9.0.0
  url_launcher: ^6.3.1
  freezed_annotation: ^2.4.4
  image_picker: ^1.2.1
  webdav_client: ^1.2.2
  dio: ^5.9.0
  win32: ^5.15.0
  ffi: ^2.1.5
  # pub's re_editor 0.8.0 (latest) doesn't implement TextInputClient.onFocusReceived,
  # an abstract member added in Flutter 3.44 — so it fails to compile. Use the same
  # fork upstream FlClash uses; its `Fix onFocusReceived Missing` commit adds it.
  # The exact commit is pinned by pubspec.lock.
  re_editor:
    git:
      url: https://github.com/chen08209/re-editor
      ref: main
  re_highlight: ^0.0.3
  archive: ^4.0.7
  lpinyin: ^2.0.3
  emoji_regex: ^0.0.5
  hotkey_manager: ^0.2.3
  uni_platform: ^0.1.3
  device_info_plus: ^12.3.0
  connectivity_plus: ^7.0.0
  screen_retriever: ^0.2.0
  defer_pointer: ^0.0.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_js:
    git:
      url: https://github.com/chen08209/flutter_js
      ref: master
  flutter_svg: ^2.2.3
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  forui: ^0.22.3
  fl_chart: ^1.2.0
  google_sign_in: ^6.2.1
  flutter_web_auth_2: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  riverpod_lint: ^2.3.13
  custom_lint: ^0.7.3
  flutter_launcher_icons: ^0.14.4

# Load-bearing: removing this re-breaks `dart run build_runner` on any fresh resolve.
# The custom_lint 0.7.3 stack (via riverpod_lint 2.x) splits across two analyzer eras:
#   - analyzer_plugin 0.12.0 calls publiclyExporting2, removed in analyzer 7.6.0 (needs < 7.6.0)
#   - custom_lint_visitor's top build (1.0.0+7.7.0) needs analyzer >= 7.7.0 (DotShorthand* nodes)
# A fresh resolve lands on analyzer 7.6.0 + analyzer_plugin 0.12.0 and fails to compile the
# build_runner entrypoint. Pin BOTH to the matching 7.3.0 build. The proper fix is migrating
# to riverpod 3.x (riverpod_generator ^4 / riverpod_lint ^3, as upstream FlClash does), which
# drops this whole stack — until then, keep this override.
dependency_overrides:
  analyzer: 7.3.0
  custom_lint_visitor: 1.0.0+7.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/fonts/
    - assets/images/
    - assets/images/avatars/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
    - family: Twemoji
      fonts:
        - asset: assets/fonts/Twemoji.Mozilla.ttf
    - family: Icons
      fonts:
        - asset: assets/fonts/Icons.ttf
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded-Regular.ttf

ffigen:
  name: "ClashFFI"
  output: "lib/clash/generated/clash_ffi.dart"
  headers:
    entry-points:
      - "libclash/android/arm64-v8a/libclash.h"

flutter_intl:
  enabled: true
  class_name: AppLocalizations
  arb_dir: arb
  output_dir: lib/l10n

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0F1B2A"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  adaptive_icon_monochrome: "assets/images/icon_white.png"
  macos:
    generate: true
    image_path: "assets/images/icon.png"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 256
